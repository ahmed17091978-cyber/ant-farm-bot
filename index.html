<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сила Муравья</title>
    <!-- Официальный скрипт Telegram Web App -->
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; padding: 20px; text-align: center; margin: 0; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 20px; border: 1px solid #333; }
        h1 { color: #ffb300; font-size: 24px; margin-top: 0; }
        .stat { font-size: 16px; margin: 10px 0; border-bottom: 1px solid #2a2a2a; padding-bottom: 8px; text-align: left; }
        .stat span { float: right; font-weight: bold; color: #fff; }
        .btn { display: block; width: 100%; padding: 15px; margin: 12px 0; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-buy { background-color: #4CAF50; color: white; }
        .btn-claim { background-color: #ff9800; color: white; }
        .btn-refresh { background-color: #2196F3; color: white; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="card">
        <h1>🐜 СИЛА МУРАВЬЯ</h1>
        <p style="color: #888; font-size: 14px;">Ваша персональная ферма добычи прибыли</p>
        
        <div class="stat">👤 Мой Telegram ID: <span id="user-id">Загрузка...</span></div>
        <div class="stat">🐜 Всего муравьев: <span id="ants-count">0 шт.</span></div>
        <div class="stat">📥 Мой депозит (USDT): <span id="deposit">0.00</span></div>
        <div class="stat">💰 Накопленная прибыль: <span id="profit" style="color: #ffb300;">0.000000000</span></div>
        <div class="stat">💵 Доступный баланс: <span id="balance" style="color: #4CAF50;">0.000000000</span></div>
    </div>

    <button class="btn btn-buy" onclick="triggerAction('buy')">🛒 Купить муравья (1 USDT)</button>
    <button class="btn btn-claim" onclick="triggerAction('claim')">💸 Снять накопленную прибыль</button>
    <button class="btn btn-refresh" onclick="triggerAction('refresh')">🔄 Синхронизировать / Обновить</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Функция получения параметров
        function getParameterByName(name, url = window.location.href) {
            name = name.replace(/[\[\]]/g, '\\$&');
            var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)'),
                results = regex.exec(url);
            if (!results) return null;
            if (!results[2]) return '';
            return decodeURIComponent(results[2].replace(/\+/g, ' '));
        }

        // Читаем данные из ссылки
        let userId = getParameterByName('id');
        let ants = getParameterByName('ants') || '0';
        let deposit = getParameterByName('deposit') || '0.00';
        let profit = getParameterByName('profit') || '0.000000000';
        let balance = getParameterByName('balance') || '0.000000000';

        // Резервный способ чтения ID, если Telegram обрезал URL
        if (!userId && tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userId = tg.initDataUnsafe.user.id;
        }

        // Выводим данные на экран
        document.getElementById('user-id').innerText = userId ? userId : 'Не определен';
        document.getElementById('ants-count').innerText = ants + ' шт.';
        document.getElementById('deposit').innerText = parseFloat(deposit).toFixed(2) + ' USDT';
        document.getElementById('profit').innerText = parseFloat(profit).toFixed(9) + ' USDT';
        document.getElementById('balance').innerText = parseFloat(balance).toFixed(9) + ' USDT';

        function triggerAction(actionName) {
            tg.sendData(actionName);
            tg.close();
        }
    </script>
</body>
</html>
