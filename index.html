<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сила Муравьев</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1c222e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: #242f3d;
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 24px;
            color: #f1c40f;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .subtitle {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 25px;
        }
        .stat-box {
            background-color: #17212b;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #2b394a;
        }
        .stat-label {
            font-size: 12px;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 22px;
            font-weight: bold;
        }
        .balance .stat-value { color: #2ecc71; }
        .profit .stat-value { color: #e67e22; }
        
        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }
        .meta-box {
            background-color: #17212b;
            border-radius: 12px;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #2b394a;
        }
        .meta-box span {
            display: block;
            font-weight: bold;
            color: #f1c40f;
            margin-top: 3px;
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 10px;
        }
        .btn-claim {
            background-color: #f1c40f;
            color: #1c222e;
        }
        .btn-claim:active { background-color: #d4ac0d; }
        .btn-close {
            background-color: #e74c3c;
            color: #ffffff;
        }
        .btn-close:active { background-color: #c0392b; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐜 СИЛА МУРАВЬЕВ</h1>
        <div class="subtitle">Муравьиная ферма в реальном времени</div>

        <div class="stat-box balance">
            <div class="stat-label">💵 Баланс для вывода</div>
            <div class="stat-value" id="balance-view">0.000000 USDT</div>
        </div>

        <div class="stat-box profit">
            <div class="stat-label">💰 Накопленная прибыль</div>
            <div class="stat-value" id="profit-view">0.000000 USDT</div>
        </div>

        <div class="meta-grid">
            <div class="meta-box">📦 Муравьи:<span id="ants-view">0 шт.</span></div>
            <div class="meta-box">🔒 Депозит:<span id="deposit-view">0.00 USDT</span></div>
        </div>

        <button class="btn-claim" onclick="claimProfit()">💸 Снять прибыль</button>
        <button class="btn-close" onclick="closeWebApp()">❌ Закрыть ферму</button>
    </div>

    <script>
        // Инициализируем Telegram WebApp API
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем окно на максимум

        // Разбираем параметры из ссылки (URL), которые прислал нам бот
        const urlParams = new URLSearchParams(window.location.search);
        
        let userId = urlParams.get('id') || '0';
        let antsCount = parseInt(urlParams.get('ants')) || 0;
        let deposit = parseFloat(urlParams.get('deposit')) || 0.0;
        let currentBalance = parseFloat(urlParams.get('balance')) || 0.0;
        
        // Каждую секунду 1 муравей приносит, например, 0.00000001 USDT (подправь скорость под свой маркетинг!)
        const PROFIT_PER_ANT_PER_SECOND = 0.00000001; 
        let accumulatedProfit = 0.0;

        // Выводим стартовые данные из базы на экран
        document.getElementById('ants-view').innerText = antsCount + ' шт.';
        document.getElementById('deposit-view').innerText = deposit.toFixed(2) + ' USDT';
        document.getElementById('balance-view').innerText = currentBalance.toFixed(6) + ' USDT';
        document.getElementById('profit-view').innerText = accumulatedProfit.toFixed(8) + ' USDT';

        // Логика таймера: прибыль увеличивается каждую секунду в реальном времени
        setInterval(() => {
            if (antsCount > 0) {
                accumulatedProfit += antsCount * PROFIT_PER_ANT_PER_SECOND;
                document.getElementById('profit-view').innerText = accumulatedProfit.toFixed(8) + ' USDT';
            }
        }, 1000);

        // Функция кнопки "Снять прибыль"
        function claimProfit() {
            if (accumulatedProfit <= 0) {
                tg.showAlert("У вас пока нет накопленной прибыли для снятия!");
                return;
            }
            // Отправляем данные обратно боту в чат!
            tg.sendData(`claim_profit:${accumulatedProfit.toFixed(8)}`);
            tg.close();
        }

        // Функция кнопки "Закрыть ферму"
        function closeWebApp() {
            tg.close();
        }
    </script>
</body>
</html>
