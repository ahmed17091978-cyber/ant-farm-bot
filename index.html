<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сила Муравьев - Ферма</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #18222d);
            color: var(--tg-theme-text-color, #ffffff);
            text-align: center;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: var(--tg-theme-secondary-bg-color, #212d3b);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        h1 { color: #f4c430; font-size: 26px; margin: 0 0 5px 0; font-weight: 800; }
        .subtitle { color: #8e969e; font-size: 14px; margin-bottom: 20px; }
        .balance-box {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .balance-title { font-size: 13px; color: #8e969e; text-transform: uppercase; letter-spacing: 0.5px; }
        .accent { color: #4caf50; font-weight: bold; font-size: 22px; margin-top: 5px; }
        .profit { color: #ff9800; font-weight: bold; font-size: 26px; margin-top: 5px; }
        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.15);
            padding: 12px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 14px;
        }
        .btn {
            display: block;
            width: 100%;
            background: #f4c430;
            color: #111111;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-close { background: #e53935; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐜 СИЛА МУРАВЬЕВ</h1>
        <div class="subtitle">Муравьиная ферма в реальном времени</div>
        
        <div class="balance-box">
            <div class="balance-title">💵 Баланс для вывода</div>
            <div class="accent" id="balance">0.000156 USDT</div>
        </div>

        <div class="balance-box">
            <div class="balance-title">💰 Накопленная прибыль</div>
            <div class="profit" id="profit">0.0000000 USDT</div>
        </div>

        <div class="stats">
            <div>📦 Муравьи: <span id="ants" style="color:#f4c430; font-weight:bold;">10</span> шт.</div>
            <div>🔒 Депозит: <span id="deposit" style="color:#f4c430; font-weight:bold;">10.00</span> USDT</div>
        </div>

        <button class="btn" onclick="collectProfit()">💸 Снять прибыль</button>
        <button class="btn btn-close" onclick="window.Telegram.WebApp.close()">❌ Закрыть ферму</button>
    </div>

    <script>
        // Инициализация WebApp Telegram
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Базовые значения (синхронизируются визуально)
        let ants = 10;
        let deposit = 10.0;
        let balance = 0.000156;
        let profit = 0.000005;

        document.getElementById('ants').innerText = ants;
        document.getElementById('deposit').innerText = deposit.toFixed(2);
        document.getElementById('balance').innerText = balance.toFixed(6) + " USDT";

        // ЭФФЕКТ ЖИВОГО СЧЕТЧИКА (Каждую секунду увеличиваем прибыль прямо на экране)
        setInterval(() => {
            if (ants > 0) {
                // Формула: (1 USDT * 10% годовых) / 365 дней / 86400 секунд
                let profitPerSecond = (1.0 * 0.10) / 365 / 86400;
                profit += ants * profitPerSecond;
                document.getElementById('profit').innerText = profit.toFixed(7) + " USDT";
            }
        }, 1000);

        function collectProfit() {
            if (profit > 0) {
                balance += profit;
                tg.sendData(JSON.stringify({action: "collect", amount: profit}));
                profit = 0;
                document.getElementById('balance').innerText = balance.toFixed(6) + " USDT";
                document.getElementById('profit').innerText = "0.0000000 USDT";
                tg.showAlert("💰 Прибыль успешно переведена на баланс вывода!");
            } else {
                tg.showAlert("❌ Нет прибыли для снятия.");
            }
        }
    </script>
</body>
</html>
